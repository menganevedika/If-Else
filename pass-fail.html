<body>
    <h1>Pass-Fail Program...</h1>


    <script>
        let marks=parseInt(prompt("Enter Your Marks:"));

        if(marks>=35 && marks<=100){
            console.log("Pass");
        }
        else{
            console.log("Fail");
        }
    </script>
</body>
