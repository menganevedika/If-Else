<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Grade System</h1>


    <script>
        let marks =parseInt(prompt("Enter Your Marks:"));

        if(marks >= 1 && marks <= 100){

            if(marks >= 75){
                console.log("A+ Grade with Distinction..");
            }
            else if(marks >= 60){
                console.log("A Grade..");
            }
            else if(marks >= 50){
                console.log("B Grade..");
            }
            else if(marks >= 40){
                console.log("C Grade..");
            }
            else if(marks >=35){
                console.log("D Grade..");
            }
            else if(marks >= 1){
                console.log("Fail...");
            }
        }
        else{
            console.log("Invalid Input.....");
        }
    </script>
</body>
</html>
