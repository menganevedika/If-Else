<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Check Even-Odd Number</h1>

    <script>
        let num= prompt("Enter a Number:");

        if(num%2==0){
            console.log("Number is Even");
        }
        else{
            console.log("Number is Odd");
        }
    </script>
</body>
</html>
